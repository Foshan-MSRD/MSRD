<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的视频网站</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; margin: 0; }
        video { max-width: 90%; border: 2px solid #fff; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- controls 属性用于显示播放/暂停、音量等控件 -->
    <video controls width="800">
        <!-- 将 movie.mp4 替换为你上传到 GitHub 仓库中的视频文件名 -->
        <source src="1.mp4" type="video/mp4">
        您的浏览器不支持 HTML5 视频播放。
    </video>

</body>
</html>
