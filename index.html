<!DOCTYPE html>

    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0; color: #333; }
        header { background: #333; color: #fff; padding: 1.5rem; text-align: center; }
        .container { width: 80%; max-width: 1000px; margin: auto; overflow: hidden; padding: 20px; }
        
        /* 统一列表样式 */
        .product-box { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 30px; 
            align-items: center; 
            margin-bottom: 50px; 
            padding-bottom: 30px; 
            border-bottom: 1px solid #eee; /* 添加分割线，让列表更清晰 */
        }
        /* 移除最后一个区块的分割线 */
        .product-box:last-child { border-bottom: none; }
        
        .product-img { flex: 1; min-width: 300px; }
        .product-img img { width: 100%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: block; }
        
        .product-info { flex: 1.5; min-width: 300px; }
        h2 { color: #2c3e50; margin-top: 0; }
        p { color: #666; margin-bottom: 20px; }
        
        .btn { 
            background: #e67e22; 
            color: white; 
            padding: 10px 25px; 
            text-decoration: none; 
            border-radius: 5px; 
            display: inline-block; 
        }
        .btn:hover { background: #d35400; }
        
        /* 抖音按钮专属样式 */
        .btn-douyin {
            background: #fe2c55;
            font-weight: bold;
        }
        .btn-douyin:hover {
            background: #e11d43;
        }
    </style>
</head>
